name: Frontend CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
        run: npm run build

  cd:
    name: Build, Push and Deploy Frontend
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV    
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_APP_API_URL=${{ secrets.VITE_APP_API_URL }}
          tags: |
              ghcr.io/scholars-den/refund-frontend:${{ env.IMAGE_TAG }}
              ghcr.io/scholars-den/refund-frontend:latest

      - name: Deploy frontend over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAMESPACE: ghcr.io/scholars-den
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,IMAGE_NAMESPACE,GHCR_USERNAME,GHCR_TOKEN,VITE_APP_API_URL
          script: |
            set -e
            mkdir -p ${{ secrets.SERVER_DEPLOY_PATH }}
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            cat > .env <<EOT
            IMAGE_REGISTRY=$IMAGE_NAMESPACE
            IMAGE_TAG=$IMAGE_TAG
            VITE_APP_API_URL=$VITE_APP_API_URL
            EOT

            docker compose -f docker-compose.frontend.yml pull
            docker compose -f docker-compose.frontend.yml up -d --remove-orphans
            docker image prune -f