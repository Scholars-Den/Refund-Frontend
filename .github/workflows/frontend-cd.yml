name: Frontend Docker Deploy

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
        run: npm run build

  deploy:
    name: Deploy Frontend on VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_DEPLOY_PATH }}
          VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
          VITE_APP_SCHOLARSDEN_API_URL: ${{ secrets.VITE_APP_SCHOLARSDEN_API_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APP_DIR,VITE_APP_API_URL,VITE_APP_SCHOLARSDEN_API_URL
          script: |
            set -e
            cd "$APP_DIR"
            git pull --ff-only origin main

            cat > .env <<EOT
            VITE_APP_API_URL=$VITE_APP_API_URL
            VITE_APP_SCHOLARSDEN_API_URL=$VITE_APP_SCHOLARSDEN_API_URL
            EOT

            docker compose up -d --build --remove-orphans
            docker image prune -f
